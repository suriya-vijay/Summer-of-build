services:
  - type: web
    name: suriya-builds-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        generateValue: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3001